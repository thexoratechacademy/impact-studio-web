<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Choose Your Path</title>
    <link rel="stylesheet" href="../assets/css/choose-career-path.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>
    <main>
      <section>
        <div class="choose-path-container">
          <div class="choose-path-header">
            <h6>Enroll</h6>
            <h2>Choose Your Path</h2>
            <p>
              Explore our beginner-friendly tech courses designed to help you
              learn fast, build confidently, and launch your career the right
              way.
            </p>
          </div>
          <div class="enroll-card">
            <div class="enroll-steps">
              <div class="active">
                <span class="step active">1</span>
                <p class="step-label active">Personal Information</p>
                <img src="../assets/images/Vector (6).png" alt="arrow" />
              </div>
              <div class="">
                <span class="step">2</span>
                <p class="step-label">Educational background Details</p>
                <img src="../assets/images/Vector (6).png" alt="arrow" />
              </div>
              <div class="">
                <span class="step">3</span>
                <p class="step-label">Enrollment &amp; Program Details</p>
              </div>
            </div>
            <form class="enroll-form">
              <p class="form-heading">Profile information</p>

              <!-- ── STEP 1 ── -->
              <div class="form-container active">
                <div class="form-group">
                  <label for="title">Title *</label>
                  <div class="select-wrapper">
                    <select id="title" class="form-input" required>
                      <option value="" selected hidden></option>
                      <option>Mr</option>
                      <option>Mrs</option>
                      <option>Miss</option>
                    </select>
                    <img src="../assets/images/Symbol.png" />
                  </div>
                </div>
                <div class="form-group">
                  <label for="contact-name">Contact Name *</label>
                  <input
                    type="text"
                    id="contact-name"
                    placeholder="Person filling the form"
                    class="form-input"
                    name="Contact-name"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="company">Company Name *</label>
                  <input
                    type="text"
                    id="company"
                    class="form-input"
                    name="Company-name"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="email">Work Email Address *</label>
                  <input
                    type="email"
                    id="email"
                    class="form-input"
                    name="Work Email"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="phone">Phone Number *</label>
                  <input
                    type="tel"
                    id="phone"
                    class="form-input"
                    name="Phone-number"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="address">Office Address *</label>
                  <input
                    type="text"
                    id="address"
                    class="form-input"
                    name="Office-address"
                    required
                  />
                </div>
                <div class="form-buttons">
                  <button class="previous">Previous</button>
                  <button type="button" class="next-btn">Next</button>
                </div>
              </div>

              <!-- ── STEP 2 ── -->
              <div class="form-container">
                <div class="form-group">
                  <label for="title-b">Title *</label>
                  <div class="select-wrapper">
                    <select id="title-b" class="form-input" required>
                      <option value="" selected hidden></option>
                      <option>Mr</option>
                      <option>Mrs</option>
                      <option>Miss</option>
                    </select>
                    <img src="../assets/images/Symbol.png" />
                  </div>
                </div>
                <div class="form-group">
                  <label for="contact-name-b">Contact Name *</label>
                  <input
                    type="text"
                    id="contact-name-b"
                    placeholder="Person filling the form"
                    class="form-input"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="company-b">Company Name *</label>
                  <input type="text" id="company-b" class="form-input" required />
                </div>
                <div class="form-group">
                  <label for="email-b">Work Email Address *</label>
                  <input type="email" id="email-b" class="form-input" required />
                </div>
                <div class="form-group">
                  <label for="phone-b">Phone Number *</label>
                  <input type="tel" id="phone-b" class="form-input" required />
                </div>
                <div class="form-group">
                  <label for="address-b">Office Address *</label>
                  <input type="text" id="address-b" class="form-input" required />
                </div>
                <div class="form-buttons">
                  <button class="previous">Previous</button>
                  <button type="button" class="next-btn">Next</button>
                </div>
              </div>

              <!-- ── STEP 3 ── -->
              <div class="form-container">
                <div class="form-group">
                  <label for="title-c">Title *</label>
                  <div class="select-wrapper">
                    <select id="title-c" class="form-input" required>
                      <option value="" selected hidden></option>
                      <option>Mr</option>
                      <option>Mrs</option>
                      <option>Miss</option>
                    </select>
                    <img src="../assets/images/Symbol.png" />
                  </div>
                </div>
                <div class="form-group">
                  <label for="contact-name-c">Contact Name *</label>
                  <input
                    type="text"
                    id="contact-name-c"
                    placeholder="Person filling the form"
                    class="form-input"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="company-c">Company Name *</label>
                  <input type="text" id="company-c" class="form-input" required />
                </div>
                <div class="form-group">
                  <label for="email-c">Work Email Address *</label>
                  <input type="email" id="email-c" class="form-input" required />
                </div>
                <div class="form-group">
                  <label for="phone-c">Phone Number *</label>
                  <input type="tel" id="phone-c" class="form-input" required />
                </div>
                <div class="form-group">
                  <label for="address-c">Office Address *</label>
                  <input type="text" id="address-c" class="form-input" required />
                </div>
                <div class="form-buttons">
                  <button class="previous">Previous</button>
                  <button type="submit" class="next-btn">Next</button>
                </div>
              </div>

            </form>
          </div>
        </div>
      </section>
    </main>
    <!-- Footer -->
    <div id="footer-placeholder"></div>
    <script src="../assets/js/course-path.js"></script>

    <!-- Enrollment form submit handler -->
    <script>
      document.querySelector('.enroll-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const formData = {
          formType:      'enrollment',
          title:         document.getElementById('title').value,
          contactName:   document.getElementById('contact-name').value,
          companyName:   document.getElementById('company').value,
          email:         document.getElementById('email').value,
          phone:         document.getElementById('phone').value,
          officeAddress: document.getElementById('address').value,
        };

        const btn = e.submitter;
        btn.textContent = 'Submitting...';
        btn.disabled = true;

        try {
          const API_URL = window.location.hostname === 'localhost'
            ? "http://localhost:5000/api/submit"
            : "https://impact-studio-web.onrender.com/api/submit";

          const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
          });
          const data = await response.json();

          if (data.success) {
            alert('Enrollment submitted! We will be in touch shortly.');
            this.reset();
          } else {
            alert('Error: ' + (data.errors?.[0]?.message || data.message));
          }
        } catch (err) {
          console.error('Submit error:', err);
          alert('Could not reach the server. Please try again later.');
        } finally {
          btn.textContent = 'Next';
          btn.disabled = false;
        }
      });
    </script>
    <script src="../assets/js/footer-subscribe.js" defer></script>
</body>
</html>
