<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Choose Your Path</title>
    <link rel="stylesheet" href="../assets/css/choose-career-path.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>
    <main>
      <section>
        <div class="choose-path-container">
          <div class="choose-path-header">
            <h6>Enroll</h6>
            <h2>Choose Your Path</h2>
            <p>
              Explore our beginner-friendly tech courses designed to help you
              learn fast, build confidently, and launch your career the right
              way.
            </p>
          </div>
          <div class="enroll-card">
            <div class="enroll-steps">
              <div class="active">
                <span class="step active">1</span>
                <p class="step-label active">Personal Information</p>
                <img src="../assets/images/Vector (6).png" alt="arrow" />
              </div>
              <div class="">
                <span class="step">2</span>
                <p class="step-label">Educational background Details</p>
                <img src="../assets/images/Vector (6).png" alt="arrow" />
              </div>
              <div class="">
                <span class="step">3</span>
                <p class="step-label">Enrollment & Program Details</p>
              </div>
            </div>
            <form class="enroll-form">
              <p class="form-heading">Profile information</p>
              <div class="form-container active">
                <div class="form-group">
                  <label for="title">Title *</label>
                  <div class="select-wrapper">
                    <select id="title" class="form-input" required>
                      <option value="" selected hidden></option>
                      <option>Mr</option>
                      <option>Mrs</option>
                      <option>Miss</option>
                    </select>
                    <img src="../assets/images/Symbol.png" />
                  </div>
                </div>
                <div class="form-group">
                  <label for="contact-name">Contact Name *</label>
                  <input
                    type="text"
                    id="contact-name"
                    placeholder="Person filling the form"
                    class="form-input"
                    name="Contact-name"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="company">Company Name *</label>
                  <input
                    type="text"
                    id="company"
                    class="form-input"
                    name="Company- name"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="email">Work Email Address *</label>
                  <input
                    type="email"
                    id="email"
                    class="form-input"
                    name="Work Email"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="phone">Phone Number *</label>
                  <input
                    type="tel"
                    id="phone"
                    class="form-input"
                    name="Phone-number"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="address">Office Address *</label>
                  <input
                    type="text"
                    id="address"
                    class="form-input"
                    name="Office-address"
                    required
                  />
                </div>
                <div class="form-buttons">
                  <button class="previous">Previous</button>
                  <button type="submit" class="next-btn">Next</button>
                </div>
              </div>
              <div class="form-container">
                <div class="form-group">
                  <label for="title">TitleB *</label>
                  <div class="select-wrapper">
                    <select id="title" class="form-input" required>
                      <option value="" selected hidden></option>
                      <option>Mr</option>
                      <option>Mrs</option>
                      <option>Miss</option>
                    </select>
                    <img src="../assets/images/Symbol.png" />
                  </div>
                </div>
                <div class="form-group">
                  <label for="contact-name">Contact Name *</label>
                  <input
                    type="text"
                    id="contact-name"
                    placeholder="Person filling the form"
                    class="form-input"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="company">Company Name *</label>
                  <input type="text" id="company" class="form-input" required />
                </div>
                <div class="form-group">
                  <label for="email">Work Email Address *</label>
                  <input type="email" id="email" class="form-input" required />
                </div>
                <div class="form-group">
                  <label for="phone">Phone Number *</label>
                  <input type="tel" id="phone" class="form-input" required />
                </div>
                <div class="form-group">
                  <label for="address">Office Address *</label>
                  <input type="text" id="address" class="form-input" required />
                </div>
                <div class="form-buttons">
                  <button class="previous">Previous</button>
                  <button type="submit" class="next-btn">Next</button>
                </div>
              </div>
              <div class="form-container">
                <div class="form-group">
                  <label for="title">TitleC *</label>
                  <div class="select-wrapper">
                    <select id="title" class="form-input" required>
                      <option value="" selected hidden></option>
                      <option>Mr</option>
                      <option>Mrs</option>
                      <option>Miss</option>
                    </select>
                    <img src="../assets/images/Symbol.png" />
                  </div>
                </div>
                <div class="form-group">
                  <label for="contact-name">Contact Name *</label>
                  <input
                    type="text"
                    id="contact-name"
                    placeholder="Person filling the form"
                    class="form-input"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="company">Company Name *</label>
                  <input type="text" id="company" class="form-input" required />
                </div>
                <div class="form-group">
                  <label for="email">Work Email Address *</label>
                  <input type="email" id="email" class="form-input" required />
                </div>
                <div class="form-group">
                  <label for="phone">Phone Number *</label>
                  <input type="tel" id="phone" class="form-input" required />
                </div>
                <div class="form-group">
                  <label for="address">Office Address *</label>
                  <input type="text" id="address" class="form-input" required />
                </div>
                <div class="form-buttons">
                  <button class="previous">Previous</button>
                  <button type="submit" class="next-btn">Next</button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>
      <!-- Footer -->
    <div id="footer-placeholder"></div>
    <script src="../assets/js/course-path.js"></script>
  </body>
</html>
