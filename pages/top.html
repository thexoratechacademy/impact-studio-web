<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Information Form</title>
    <link rel="stylesheet" href="../assets/css/top.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  </head>
  <body>
    <section class="form-section">
      
      <div class="form-header">
        <div class="underline"></div>
        <h1>Tell us what you're looking for, and we'll help you find the right fit</h1>
        <p>
          Connect with our team of expert developers and designers. We'll match you with the perfect talent for your project needs.
        </p>
      </div>

      <div class="form-card">
        <h3>Profile Information</h3>
        <form id="profile-form" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label for="title">Title *</label>
              <select id="title" name="title" required aria-required="true">
                <option value="">Select Title</option>
                <option value="mr">Mr</option>
                <option value="mrs">Mrs</option>
                <option value="ms">Ms</option>
              </select>
            </div>
            <div class="form-group">
              <label for="contact">Contact Name *</label>
              <input
                type="text"
                id="contact"
                name="contact"
                placeholder="Person filling the form"
                required
                aria-required="true"
                minlength="2"
              />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="company">Company Name *</label>
              <input type="text" id="company" name="company" placeholder="Enter name..." required aria-required="true" minlength="2" />
            </div>
            <div class="form-group">
              <label for="email">Work Email Address *</label>
              <input type="email" id="email" name="email" placeholder="example@company.com" required aria-required="true" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="phone">Phone Number *</label>
              <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567" required aria-required="true" pattern="[0-9+\-\s()]{10,}" />
            </div>
            <div class="form-group">
              <label for="office">Office Address *</label>
              <input type="text" id="office" name="office" placeholder="Enter office address..." required aria-required="true" minlength="10" />
            </div>
          </div>

          <button type="submit">Next</button>
        </form>
      </div>
    </section>
    <script>
      // Form validation and submission handling
      document.getElementById('profile-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const form = this;
        const isValid = form.checkValidity();
        
        if (isValid) {
          // Collect form data
          const formData = new FormData(form);
          const data = Object.fromEntries(formData.entries());
          
          console.log('Form submitted successfully:', data);
          alert('Thank you! Your information has been submitted. We will contact you soon.');
          
          // Here you would typically send the data to your server
          // Example: fetch('/api/submit', { method: 'POST', body: JSON.stringify(data) });
          
          form.reset();
        } else {
          // Show validation errors
          const inputs = form.querySelectorAll('input, select');
          inputs.forEach(input => {
            if (!input.validity.valid) {
              input.reportValidity();
            }
          });
        }
      });

      // Real-time validation feedback
      const inputs = document.querySelectorAll('#profile-form input, #profile-form select');
      inputs.forEach(input => {
        input.addEventListener('blur', function() {
          if (this.value && !this.validity.valid) {
            this.style.borderColor = '#dc3545';
          } else if (this.value && this.validity.valid) {
            this.style.borderColor = '#28a745';
          } else {
            this.style.borderColor = '#cacaca';
          }
        });
        
        input.addEventListener('focus', function() {
          this.style.borderColor = '#0077b6';
        });
      });
    </script>
  </body>
</html>
