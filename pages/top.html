<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Information Form</title>
    <link rel="stylesheet" href="../assets/CSS/top.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  </head>
  <body>
    <section class="form-section">
      <div class="form-header">
        <div class="underline"></div>
        <h1>Tell us what you're looking for, and we'll help you find the right fit</h1>
        <p>
          Lorem Ipsum is simply dummy text of the printing and typesetting
          industry. Lorem<br />
          Ipsum has been the industry’s standard dummy
        </p>
      </div>

      <div class="form-card">
        <h3>Profile Information</h3>
        <form>
          <div class="form-row">
            <div class="form-group">
              <label for="title">Title *</label>
              <select id="title" required>
                <option value="">Select Title</option>
                <option value="mr">Mr</option>
                <option value="mrs">Mrs</option>
                <option value="ms">Ms</option>
              </select>
            </div>
            <div class="form-group">
              <label for="contact">Contact Name*</label>
              <input
                type="text"
                id="contact"
                placeholder="Person filling the form"
                required
              />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="company">Company Name *</label>
              <input type="text" id="company" required />
            </div>
            <div class="form-group">
              <label for="email">Work Email Address *</label>
              <input type="email" id="email" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="phone">Phone Number*</label>
              <input type="tel" id="phone" required />
            </div>
            <div class="form-group">
              <label for="office">Office Address *</label>
              <input type="text" id="office" required />
            </div>
          </div>

          <button type="submit">Next</button>
        </form>
      </div>
    </section>
  </body>
</html>
