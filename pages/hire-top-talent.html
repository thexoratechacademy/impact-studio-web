<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hire Top Tech Talent</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/hire.css">
  </head>
  <body>
    <!-- Navbar -->
    <div id="navbar-placeholder"></div>
    
      <section class="hire-talent-section">
        <div class="header">
            <h1 class="section-title">Hire Top Tech Talent</h1>
          <p class="section-description">
            Access our pool of trained, vetted professionals with real-world
            experience in web development, mobile app development, design,
            digital marketing, and more. Let us know what you need, and we'll
            connect you with the right talent.
          </p>
          </div>
          <div class="talent-slider">
            <div class="talent-cards">
              <div class="talent-card card-purple">
                <img
                  src="../assets/images/Thexora-Images/Profs/Digital-rol.webp"
                  alt="Digital marketing professional"
                  width="300"
                  height="300"
                />
              </div>
              <div class="talent-card card-gray">
                <img
                  src="../assets/images/Thexora-Images/Profs/chioma.webp"
                  alt="Chioma - professional"
                  width="300"
                  height="300"
                />
              </div>
              <div class="talent-card card-blue">
                <img
                  src="../assets/images/Thexora-Images/Profs/Omoba.webp"
                  alt="Omoba - professional"
                  width="300"
                  height="300"
                />
              </div>
              <div class="talent-card card-gray-dark">
                <img
                  src="../assets/images/Thexora-Images/Profs/Somto.webp"
                  alt="Somto - professional"
                  width="300"
                  height="300"
                />
              </div>
            </div>
          <!-- </div> -->
        </div>
      </section>
    
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/hire-top-talent.js"></script>
  </body>
</html>
